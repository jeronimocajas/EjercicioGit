<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iniciar Sesion</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:white;padding:40px;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.3);width:420px}
h1{color:#667eea;text-align:center;margin-bottom:8px}
.sub{color:#888;text-align:center;font-size:14px;margin-bottom:28px}
.fg{margin-bottom:18px}
label{display:block;color:#555;font-size:13px;font-weight:600;margin-bottom:5px}
input{width:100%;padding:12px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none}
input:focus{border-color:#667eea}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px}
.ft{text-align:center;margin-top:18px;color:#888;font-size:13px}
.ft a{color:#667eea;text-decoration:none}
</style>
</head>
<body>
<div class="box">
<h1>EduApp</h1>
<p class="sub">Sistema de Gestion Academica - CECAR</p>
<form id="loginForm">
<div class="fg"><label>Correo Institucional</label><input type="email" placeholder="correo@cecar.edu.co" required></div>
<div class="fg"><label>Contrasena</label><input type="password" placeholder="Ingresa tu contrasena" required></div>
<div class="fg" style="display:flex;align-items:center;gap:8px"><input type="checkbox" style="width:auto"><label style="margin:0">Recordar sesion</label></div>
<button type="submit" class="btn">Iniciar Sesion</button>
</form>
<div class="ft"><p>Olvidaste tu contrasena? <a href="#">Recuperala aqui</a></p></div>
</div>
</body>
</html>
